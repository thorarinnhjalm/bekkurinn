name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Build requires env vars to be present — use harmless stubs for CI
          NEXT_PUBLIC_FIREBASE_API_KEY: stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: stub
          NEXT_PUBLIC_FIREBASE_APP_ID: stub
